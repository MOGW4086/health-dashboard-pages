<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>睡眠グラフ | Health Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"
          integrity="sha256-DiMmxoaAcr7BWSdgxnKQQ8ruopYKK0bO5qIZKqxqv/A="
          crossorigin="anonymous"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>Health Dashboard</h1>
  <nav>
    <a href="index.html">サマリー</a>
    <a href="weight.html">体重</a>
    <a href="activity.html">活動</a>
    <a href="sleep.html" class="active">睡眠</a>
  </nav>
</header>
<main>
  <div class="card">
    <h2>睡眠時間推移</h2>
    <div class="period-btns">
      <button onclick="render(7)" id="btn-7" class="active">1週間</button>
      <button onclick="render(30)" id="btn-30">1ヶ月</button>
      <button onclick="render(90)" id="btn-90">3ヶ月</button>
    </div>
    <canvas id="sleep-chart" height="300"></canvas>
    <p class="no-data" id="no-data" style="display:none">データがありません</p>
  </div>
  <div class="card">
    <h2>いびきスコア推移</h2>
    <canvas id="snoring-chart" height="300"></canvas>
    <p class="no-data" id="no-data-snoring" style="display:none">データがありません</p>
  </div>
</main>

<script>
let allData = [];
let chart = null;
let snoringChart = null;

function render(days) {
  ["7","30","90"].forEach(d => {
    document.getElementById("btn-"+d).classList.toggle("active", String(days) === d);
  });
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - days + 1);
  const cutoffStr = cutoff.toLocaleDateString('sv-SE');
  const data = allData.filter(d => d.date >= cutoffStr);

  document.getElementById("no-data").style.display = data.length ? "none" : "";
  if (chart) { chart.destroy(); chart = null; }
  if (data.length) {
    chart = new Chart(document.getElementById("sleep-chart"), {
      type: "bar",
      data: {
        labels: data.map(d => d.date),
        datasets: [{
          label: "睡眠時間 (h)",
          data: data.map(d => d.sleep_hours),
          backgroundColor: "rgba(90,60,160,0.7)",
        }],
      },
      options: {
        responsive: true,
        scales: { y: { title: { display: true, text: "時間" }, beginAtZero: true, max: 12 } },
        plugins: { legend: { display: false } },
      },
    });
  }

  const snoringData = data.filter(d => d.snoring_score != null);
  document.getElementById("no-data-snoring").style.display = snoringData.length ? "none" : "";
  if (snoringChart) { snoringChart.destroy(); snoringChart = null; }
  if (snoringData.length) {
    snoringChart = new Chart(document.getElementById("snoring-chart"), {
      type: "line",
      data: {
        labels: snoringData.map(d => d.date),
        datasets: [{
          label: "いびきスコア",
          data: snoringData.map(d => d.snoring_score),
          borderColor: "rgba(60,160,90,0.9)",
          backgroundColor: "rgba(60,160,90,0.15)",
          pointRadius: 4,
          tension: 0.3,
          fill: true,
        }],
      },
      options: {
        responsive: true,
        scales: { y: { title: { display: true, text: "スコア" }, beginAtZero: true } },
        plugins: { legend: { display: false } },
      },
    });
  }
}

fetch("data/sleep.json")
  .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
  .then(data => { allData = data; render(7); })
  .catch(() => {
    document.getElementById("no-data").textContent = "データの取得に失敗しました";
    document.getElementById("no-data").style.display = "";
    document.getElementById("no-data-snoring").textContent = "データの取得に失敗しました";
    document.getElementById("no-data-snoring").style.display = "";
  });
</script>
</body>
</html>
